name: CI and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    name: Verify backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Syntax check server
        run: node --check server.js

      - name: Start server
        env:
          PORT: 3001
          NODE_ENV: test
          DATABASE_URL: postgresql://127.0.0.1:1/invalid
          JWT_SECRET: workflow-check-secret
        run: |
          node server.js > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for health check
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3001/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "Server failed to respond"
          cat server.log
          exit 1

      - name: Show health response
        run: curl -fsS http://127.0.0.1:3001/health

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

  deploy:
    name: Trigger Render deploy
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy hook secret
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set; skipping deploy."
            exit 0
          fi

      - name: Trigger deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set; skipping deploy."
            exit 0
          fi

          curl -fsSL -X POST "$DEPLOY_HOOK_URL"